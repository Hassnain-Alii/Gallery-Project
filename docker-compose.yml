services:
  mongodb:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gallery-network

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    networks:
      - gallery-network

  minio:
    image: minio/minio
    ports:
      - "9200:9000"
      - "9201:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - gallery-network

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/images || true;
      /usr/bin/mc anonymous set public myminio/images;
      exit 0;
      "
    networks:
      - gallery-network

