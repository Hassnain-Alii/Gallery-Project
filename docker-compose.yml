services:
  mongodb:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gallery-network

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    networks:
      - gallery-network


