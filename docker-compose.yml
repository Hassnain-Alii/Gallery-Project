services:
  mongodb:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gallery-network

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    networks:
      - gallery-network


  backend:
    build:
      context: ./backend
    ports:
      - "5002:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gallery
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - mongodb
      - redis
    networks:
      - gallery-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    ports:
      - "5175:5175"
    environment:
      - VITE_API_URL=http://localhost:5002
    depends_on:
      - backend
    networks:
      - gallery-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # required for hot reload to work via windows
    command: npm run dev -- --host 0.0.0.0

volumes:
  mongo-data:

networks:
  gallery-network:
    driver: bridge
    
